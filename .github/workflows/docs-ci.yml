name: Docs CI

on:
  push:
    branches: ["main", "improvements/**", "docs/**", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint all markdown files
        run: markdownlint "**/*.md" --ignore node_modules --ignore ".specify/**" --ignore ".claude/**"

  link-check:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check links in all markdown files
        run: |
          find . -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./.specify/*" \
            -not -path "./.claude/*" \
            | xargs -I {} markdown-link-check {} \
              --config .github/mlc-config.json

  spell-check:
    name: Spell Check (Advisory)
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory only — does not block merge
    steps:
      - uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell

      - name: Spell check markdown files
        run: cspell "**/*.md" --no-progress --config .github/cspell.json
